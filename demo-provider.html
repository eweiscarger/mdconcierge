<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MDconcierge — Provider Tutorial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap');
  :root{--gold:#c8922a;--navy:#0f1e3d;--cream:#FAF7F2;--steel:#6B9FD4;--border:#DDD5C8;--ink:#1C1917;--muted:#6B6560;--line:#DDD5C8;--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);font-family:var(--sans);color:var(--ink);}
  .wrap{max-width:880px;margin:0 auto;padding:20px 16px 40px;}
  .hdr{background:#fff;border:1px solid var(--border);border-bottom:none;border-radius:12px 12px 0 0;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .hdr img{height:42px;display:block;}
  .hdr .t{color:var(--navy);font-size:11px;margin-top:3px;letter-spacing:.08em;text-transform:uppercase;}
  .hdr .role{font-size:12px;font-weight:700;color:var(--navy);border:1px solid var(--navy);border-radius:20px;padding:4px 12px;}
  h2{font-family:var(--serif);}
  .stage{background:#fff;border:1px solid var(--line);border-top:none;padding:0;}
  .prog{height:5px;background:#eef0f2;}
  .prog>div{height:100%;background:var(--gold);transition:width .4s;}
  .step{padding:26px 30px 8px;}
  .kicker{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;}
  h2{margin:4px 0 14px;font-size:23px;}
  .visual{border:1px solid var(--line);border-radius:12px;background:#f7f8fa;padding:18px;min-height:210px;}
  .cap{margin:16px 0 8px;font-size:15px;line-height:1.6;color:#2a3340;}
  .try{display:inline-block;margin-top:6px;font-size:13px;font-weight:700;color:#1a4e8a;text-decoration:none;border:1px solid #b8d4ee;background:#eef5fc;border-radius:8px;padding:7px 13px;}
  .bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);padding:14px 30px;background:#fcfcfd;border-radius:0 0 12px 12px;border:1px solid var(--line);border-top:none;}
  .btn{border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;}
  .btn.g{background:var(--gold);color:#fff;}.btn.n{background:var(--navy);color:#fff;}.btn.o{background:#fff;border:1px solid #cdd3da;color:var(--ink);}
  .btn:disabled{opacity:.4;cursor:default;}
  .spacer{flex:1;}
  .toggle{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer;}
  .dots{display:flex;gap:6px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#cdd3da;cursor:pointer;}
  .dot.on{background:var(--gold);}
  .stepno{font-size:12px;color:var(--muted);}
  .mock{font-size:13px;}
  .m-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:8px;}
  .m-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f0f2f4;}
  .m-row:last-child{border:none;}
  .pill{display:inline-block;font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px;}
  .pill.new{background:#eef5fc;color:#1a4e8a;}.pill.routed{background:#eef7f1;color:#1e7a52;}.pill.warn{background:#fff8e8;color:#9a6700;}.pill.ok{background:#eaf7f0;color:#1e9e6a;}
  .hl{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px;}
  .note{font-size:12px;color:#8a5a00;background:#fdf6e8;border:1px solid #f0d79a;border-radius:7px;padding:8px 11px;margin-top:10px;}
  .btn-mock{display:inline-block;background:var(--gold);color:#fff;font-size:12px;font-weight:700;border-radius:7px;padding:6px 12px;margin-top:4px;}
  .btn-acc{background:#2ecc8a;color:#06351f;}.btn-dec{background:#fff;border:1px solid #e0556b;color:#e0556b;}
  .email{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .email .eh{background:var(--navy);color:#fff;padding:8px 12px;font-size:12px;}
  .email .eb{padding:12px;font-size:12.5px;color:#2a3340;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
  .tile{border:1px solid var(--line);border-radius:7px;padding:8px 4px;text-align:center;font-size:10.5px;font-weight:600;background:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><img src="logo.jpg" alt="MDconcierge"/><div class="t">Interactive Tutorial</div></div>
    <div class="role">🩺 For Providers</div>
  </div>
  <div class="stage">
    <div class="prog"><div id="bar" style="width:0;"></div></div>
    <div class="step">
      <div class="kicker" id="kicker">Step</div>
      <h2 id="title">…</h2>
      <div class="visual" id="visual"></div>
      <div class="cap" id="cap"></div>
      <div id="trywrap"></div>
    </div>
  </div>
  <div class="bar">
    <button class="btn o" id="back" onclick="go(I-1)">◀ Back</button>
    <button class="btn n" id="next" onclick="go(I+1)">Next ▶</button>
    <button class="btn g" id="mute" onclick="toggleMute()">🔊 Sound on</button>
    <label class="toggle"><input type="checkbox" id="subs" checked onchange="toggleSubs(this.checked)"/> 💬 Subtitles</label>
    <label class="toggle"><input type="checkbox" id="auto" checked onchange="AUTO=this.checked"/> ⏭ Auto-advance</label>
    <div class="spacer"></div>
    <span class="stepno" id="stepno"></span>
    <div class="dots" id="dots"></div>
  </div>
</div>
<script>
const SITE='https://mdconcierge.net/';
const STEPS=[
 {k:'Welcome',t:'New patients, with the busywork removed',
  v:`<div class="mock"><div class="m-card"><b>What MDconcierge sends your office</b><div style="color:#6b7583;font-size:12px;margin-top:6px;">Pre-screened, represented patients — plus one-click import into your EHR and a simple way to handle records and reviews. No new software to install.</div></div></div>`,
  say:"Welcome. You're now connected to the MDconcierge network — a coordinated system that sends your office new, attorney-represented patients and handles the back-and-forth for you. Every message we send has one-touch buttons to act on, and you get your own portal to see and manage every case in one place. Nothing to install. Let me show you how it flows.",
  try:null},

 {k:'The referral email',t:'You get a privacy-safe notice first',
  v:`<div class="email"><div class="eh">MDconcierge Coordination · New patient referral</div>
     <div class="eb">We have a new <b>auto-injury</b> referral near <b>Philadelphia, PA</b> (reference MDC-A-2026-104872). Injury: lower back. The patient is represented by counsel.<br><span style="color:#6b7583;">Patient details unlock when you accept.</span><br><br><span class="btn-mock btn-acc">✅ Accept &amp; view case</span> <span class="btn-mock btn-dec">Decline</span></div></div>`,
  say:"First, you get an email about a new referral — but notice there's no patient name or contact info yet. For privacy, you only see the case type, the injury area, and the general location. You can Accept or Decline right from the email — and at the bottom of every message we send, there's a row of one-touch buttons to request records, report an exam, or jump to your cases. Nothing is shared until you choose to accept.",
  try:null},

 {k:'Accept to unlock',t:'Full details + one-click import',
  v:`<div class="mock"><div class="m-card"><span class="pill ok">✓ Accepted</span> <b>Maria Lopez</b> · (215) 555-0148
     <div class="m-row"><span>DOB</span><span>04/11/1989</span></div><div class="m-row"><span>Injury</span><span>Lower back — auto</span></div></div>
     <div class="m-card"><b>Import to your EHR</b><div class="grid"><div class="tile">Epic</div><div class="tile">athena</div><div class="tile">eCW</div><div class="tile">DrChrono</div></div></div></div>`,
  say:"The moment you accept, the full patient details appear — name, date of birth, phone, and the injury. And instead of retyping anything, you pick your EHR — Epic, athenahealth, eClinicalWorks, and so on — and download a ready-to-import file. Everyone's on a different system, so we give you a universal file that works with all of them.",
  try:null},

 {k:'Update scheduling',t:'One tap keeps the attorney in the loop',
  v:`<div class="mock"><div class="m-card"><b>Update scheduling</b><div style="font-size:12px;color:#6b7583;margin:6px 0;">One tap — we relay it to the attorney's office for you.</div>
     <span class="btn-mock btn-acc">✅ Scheduled</span> <span class="btn-mock">Pending contact</span> <span class="btn-mock">Unable to reach</span></div></div>`,
  say:"When you book the patient, just tap Scheduled and enter the date. We relay it to the attorney's office automatically, so you don't have to make that call. If you can't reach the patient, one tap tells us that too, and we'll help follow up.",
  try:null},

 {k:'See all your referrals',t:'Your practice portal — every case in one place',
  v:`<div class="mock">
     <div class="m-card"><div class="m-row"><span><b>Maria Lopez</b> · Dr. Lee</span><span class="pill ok">Scheduled</span></div></div>
     <div class="m-card"><div class="m-row"><span><b>James Carter</b> · Dr. Patel</span><span class="pill routed">New — review</span></div></div>
     <div class="note">One front-desk login sees every doctor in your practice.</div></div>`,
  say:"You also get your own portal showing every referral for your whole practice — all your doctors in one place. Getting in is easy: click the secure sign-in link we email you, or use a password — whichever you prefer. You're registered automatically the moment your first case is routed, so there's nothing to set up. And anything you can do from the email buttons, you can also do here by opening a case.",
  try:['See the portal sign-in','portal.html']},

 {k:'Reviews & deadlines',t:'Report a UR — we help you beat the clock',
  v:`<div class="email"><div class="eh">MDconcierge · Time-sensitive — UR records due</div>
     <div class="eb">A Utilization Review was opened on this case. Records need to reach the reviewer <b>by June 20</b> — late records usually mean a denial. Reply once they're sent.<br><br><span class="btn-mock">Confirm records sent</span></div></div>`,
  say:"If a Utilization Review comes up, we'll alert you with the deadline, because late records usually mean an automatic denial. When you've sent them, one tap confirms it. We're watching the clock with you so nothing slips.",
  try:null},

 {k:'Sending records',t:'Just reply or forward — we pass them through',
  v:`<div class="mock"><div class="m-card"><b>How records move</b><div style="font-size:12px;color:#6b7583;margin-top:6px;">Reply to our email and attach the records. We forward them to the attorney and <b>do not store a copy</b> — we're only the conduit, under our signed agreement.</div><div class="note">A signed Business Associate Agreement is in place before any records flow.</div></div></div>`,
  say:"When it's time to send records, you simply reply to our email and attach them. We forward them to the attorney's office and never keep a copy — we're only the secure conduit, and that's covered by the Business Associate Agreement we sign before any records move. Nothing sensitive sits in our system.",
  try:null},

 {k:'That’s it',t:'Accept, import, treat — we handle the rest',
  v:`<div class="mock"><div class="m-card" style="text-align:center;padding:22px;"><div style="font-size:30px;">🩺</div><b>You’re ready.</b><div style="color:#6b7583;font-size:13px;margin-top:6px;">Accept a referral, import the patient, and treat.<br>We coordinate the scheduling, records, and updates.</div></div></div>`,
  say:"And that's the whole flow. Accept a referral, import the patient into your system, and treat them. We handle the scheduling updates, the records, and the deadlines in the background. Thanks for being part of the network.",
  try:['Open your portal','portal.html']},
];

let I=0, AUTO=true, MUTED=false, SUBS=true, VOICE=null;
const hasTTS=('speechSynthesis' in window);
function pickVoice(){
  const vs=speechSynthesis.getVoices()||[];
  const en=vs.filter(v=>/^en/i.test(v.lang));
  let v=en.find(v=>/natural|neural/i.test(v.name||''));   // best quality (esp. Microsoft *Online (Natural)* in Edge)
  if(v)return v;
  const pref=['Samantha','Aria','Jenny','Ava','Allison','Google US English','Microsoft Aria','Microsoft Guy','Daniel','Karen','Moira'];
  for(const n of pref){v=en.find(x=>(x.name||'').includes(n));if(v)return v;}
  return en[0]||vs[0]||null;
}
function speak(text){
  if(!hasTTS){ AUTO=false; return; }
  speechSynthesis.cancel();
  if(MUTED)return;
  const u=new SpeechSynthesisUtterance(text);
  if(VOICE)u.voice=VOICE;
  u.rate=1.0;u.pitch=1.0;
  u.onend=()=>{ if(AUTO && !MUTED && I<STEPS.length-1) setTimeout(()=>{ if(AUTO) go(I+1); },800); };
  speechSynthesis.speak(u);
}
function renderDots(){ document.getElementById('dots').innerHTML=STEPS.map((s,n)=>`<div class="dot ${n===I?'on':''}" onclick="go(${n})" title="${s.k}"></div>`).join(''); }
function go(n){
  I=Math.max(0,Math.min(STEPS.length-1,n));
  const s=STEPS[I];
  document.getElementById('kicker').textContent='Step '+(I+1)+' · '+s.k;
  document.getElementById('title').textContent=s.t;
  document.getElementById('visual').innerHTML=s.v;
  const cap=document.getElementById('cap'); cap.textContent=s.say; cap.style.display=SUBS?'block':'none';
  document.getElementById('trywrap').innerHTML=s.try?`<a class="try" href="${SITE}${s.try[1]}" target="_blank" rel="noopener">${s.try[0]} ↗</a>`:'';
  document.getElementById('bar').style.width=(I/(STEPS.length-1)*100)+'%';
  document.getElementById('back').disabled=(I===0);
  document.getElementById('next').disabled=(I===STEPS.length-1);
  document.getElementById('stepno').textContent=(I+1)+' / '+STEPS.length;
  renderDots(); speak(s.say);
}
function toggleMute(){
  MUTED=!MUTED;
  document.getElementById('mute').textContent=MUTED?'🔇 Muted':'🔊 Sound on';
  if(MUTED){ if(hasTTS)speechSynthesis.cancel(); } else speak(STEPS[I].say);
}
function toggleSubs(on){ SUBS=on; document.getElementById('cap').style.display=SUBS?'block':'none'; }
if(hasTTS){ VOICE=pickVoice(); speechSynthesis.onvoiceschanged=()=>{ if(!VOICE)VOICE=pickVoice(); }; }
window.addEventListener('beforeunload',()=>{try{speechSynthesis.cancel();}catch(e){}});
go(0);
</script>
</body>
</html>
