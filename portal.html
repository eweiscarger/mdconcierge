<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MDconcierge — Partner Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root{--navy:#0f1e3d;--gold:#c8922a;--cream:#FAF7F2;--steel:#6B9FD4;--border:#DDD5C8;--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;}
  body{margin:0;background:var(--cream);font-family:var(--sans);color:#1C1917;}
  .wrap{max-width:680px;margin:0 auto;padding:24px 16px 60px;}
  .hdr{background:#fff;border:1px solid var(--border);border-bottom:none;border-radius:14px 14px 0 0;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;}
  .hdr img{height:44px;display:block;}
  .hdr .t{color:var(--navy);font-size:11px;margin-top:3px;letter-spacing:.1em;text-transform:uppercase;}
  .hdr .out{color:var(--navy);font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;}
  .hdr .out:hover{color:var(--gold);}
  h2{font-family:var(--serif);color:var(--navy);}
  .card{background:#fff;border:1px solid #e3e6ea;border-top:none;border-radius:0 0 12px 12px;padding:24px;}
  h2{margin:0 0 6px;font-size:19px;}h3{font-size:13px;margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px;color:#6b7583;}
  .muted{color:#6b7583;font-size:13px;}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 5px;}
  input{width:100%;box-sizing:border-box;padding:11px 13px;border:1px solid #cdd3da;border-radius:9px;font-size:15px;}
  input:focus{outline:none;border-color:#c8922a;}
  .btn{display:inline-block;padding:12px 22px;margin:16px 0 0;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;}
  .gold{background:#c8922a;color:#fff;}.gold:hover{background:#b07f1f;}
  .navy{background:#1a2230;color:#fff;}
  .err{color:#c0392b;font-size:13px;margin-top:10px;font-weight:600;min-height:16px;}
  .cs{border:1px solid #e3e6ea;border-radius:11px;padding:16px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .cs:hover{border-color:#c8922a;}
  .cs .info{min-width:0;}
  .cs .nm{font-size:15px;font-weight:700;}
  .cs .rf{font-size:12px;color:#6b7583;margin-top:2px;}
  .badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px;}
  .lock{display:inline-block;font-size:11px;color:#9a6700;background:#fef6e7;border:1px solid #f0d79a;border-radius:20px;padding:3px 10px;margin-top:6px;}
  .open{white-space:nowrap;}
  .empty{text-align:center;color:#6b7583;padding:30px 10px;}
  .psec{border:1px solid #e3e6ea;border-radius:11px;padding:16px;margin-top:16px;}
  .psec h3{margin:0 0 6px;}
  .prep{border:1px dashed #cdd3da;border-radius:9px;padding:14px;margin-top:12px;position:relative;}
  .prm{position:absolute;top:8px;right:10px;background:none;border:none;color:#c0392b;font-size:12px;font-weight:700;cursor:pointer;}
  .padd{background:#eef5fc;border:1px solid #b8d4ee;color:#1a4e8a;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px;align-items:center;}
  @media(max-width:560px){.g2,.g3{grid-template-columns:1fr;}}
  .ck{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;margin-top:12px;}
  .ck input{width:auto;}
  .err{color:#c0392b;font-size:13px;margin-top:12px;font-weight:600;min-height:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><img src="logo.jpg" alt="MDconcierge"/><div class="t">Partner Portal</div></div>
    <a class="out" id="logout" style="display:none;" onclick="logout()">Sign out</a>
  </div>
  <div class="card" id="card"><div class="muted">Loading…</div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://pjdbzrzadlldojuvdrfj.supabase.co';
const SUPABASE_KEY='sb_publishable_Syx-8oQDjnR-XYYMA2T-wQ_qyKuFdfL';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const params=new URLSearchParams(location.search);
const setupTok=params.get('setup')||'';
const keyParam=params.get('key')||'';
const card=document.getElementById('card');
const SESS_KEY='mdc_portal_session';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function cap(s){s=String(s||'');return s.charAt(0).toUpperCase()+s.slice(1);}
function getSess(){try{return localStorage.getItem(SESS_KEY)||'';}catch(e){return'';}}
function setSess(t){try{t?localStorage.setItem(SESS_KEY,t):localStorage.removeItem(SESS_KEY);}catch(e){}}
function showLogoutBtn(on){document.getElementById('logout').style.display=on?'inline':'none';}

const STATUS_LABEL={new:'Received',review:'In review',routed:'With you',scheduled:'Scheduled',accepted:'Accepted',declined:'Declined',closed:'Closed',escalated:'Needs attention'};
const STATUS_COLOR={new:'#eef5fc;#1a4e8a',review:'#fef6e7;#9a6700',routed:'#eef7f1;#1e7a52',scheduled:'#eaf7f0;#1e9e6a',accepted:'#eaf7f0;#1e9e6a',closed:'#eef0f2;#6b7583',declined:'#fdeceb;#c0392b',escalated:'#fdeceb;#c0392b'};

// ---------- set-password (from invite link) ----------
function showSetup(){
  showLogoutBtn(false);
  card.innerHTML=`<h2>Set up your portal login</h2>
    <p class="muted">Create a password to access your MDconcierge cases anytime — no more hunting for email links.</p>
    <label>New password <span class="muted">(at least 8 characters)</span></label>
    <input id="p1" type="password" autocomplete="new-password"/>
    <label>Confirm password</label>
    <input id="p2" type="password" autocomplete="new-password"/>
    <div class="err" id="e"></div>
    <button class="btn gold" onclick="doSetPassword()">Set password &amp; sign in</button>`;
}
async function doSetPassword(){
  const p1=document.getElementById('p1').value, p2=document.getElementById('p2').value;
  const e=document.getElementById('e');
  if(p1.length<8){e.textContent='Password must be at least 8 characters.';return;}
  if(p1!==p2){e.textContent='Passwords do not match.';return;}
  e.textContent='Saving…';
  const {data,error}=await sb.rpc('portal_set_password',{p_setup_token:setupTok,p_password:p1});
  if(error||!data||!data.ok){
    e.textContent=(data&&data.error==='expired')?'This setup link has expired — contact referrals@mdconcierge.net for a new one.'
      :(data&&data.error==='weak')?'Password must be at least 8 characters.'
      :'This setup link is not valid. Contact referrals@mdconcierge.net.';
    return;
  }
  setSess(data.session_token);
  history.replaceState(null,'',location.pathname);
  loadCases();
}

// ---------- login ----------
function showLogin(msg){
  showLogoutBtn(false);
  card.innerHTML=`<h2>Sign in</h2>
    <p class="muted">Access the cases coordinated for you.</p>
    <label>Email</label><input id="em" type="email" autocomplete="username"/>
    <label>Password</label><input id="pw" type="password" autocomplete="current-password"/>
    <div class="err" id="e">${msg?esc(msg):''}</div>
    <button class="btn gold" onclick="doLogin()">Sign in</button>
    <div style="margin-top:14px;"><a onclick="requestLink()" style="font-size:13px;font-weight:600;color:#1a4e8a;cursor:pointer;">✉️ Email me a sign-in link instead (no password)</a></div>
    <p class="muted" style="margin-top:18px;">No account yet? You'll get a one-time setup link by email when a case is routed to you. Questions: <a href="mailto:referrals@mdconcierge.net">referrals@mdconcierge.net</a></p>`;
  const pw=document.getElementById('pw');
  if(pw)pw.addEventListener('keydown',ev=>{if(ev.key==='Enter')doLogin();});
}
async function doLogin(){
  const em=document.getElementById('em').value.trim(), pw=document.getElementById('pw').value;
  const e=document.getElementById('e');
  if(!em||!pw){e.textContent='Enter your email and password.';return;}
  e.textContent='Signing in…';
  const {data,error}=await sb.rpc('portal_login',{p_email:em,p_password:pw});
  if(error||!data||!data.ok){e.textContent='Email or password not recognized.';return;}
  setSess(data.session_token);
  loadCases();
}
async function requestLink(){
  const em=(document.getElementById('em').value||'').trim();
  const e=document.getElementById('e');
  if(!em){e.textContent='Enter your email above first, then tap the link option.';return;}
  e.textContent='Sending…';
  try{ await sb.rpc('portal_request_link',{p_email:em}); }catch(err){}
  e.style.color='#1e9e6a';
  e.textContent='If '+em+' is registered, a secure sign-in link is on its way — check your email.';
}
async function doKeyLogin(){
  showLogoutBtn(false);
  card.innerHTML='<div class="muted">Signing you in…</div>';
  const {data,error}=await sb.rpc('portal_key_login',{p_key:keyParam});
  history.replaceState(null,'',location.pathname);
  if(error||!data||!data.ok){showLogin('That sign-in link is invalid or expired — sign in below, or request a fresh link.');return;}
  setSess(data.session_token);
  loadCases();
}

// ---------- my cases ----------
async function loadCases(){
  const tok=getSess();
  if(!tok){showLogin();return;}
  showLogoutBtn(true);
  card.innerHTML='<div class="muted">Loading your cases…</div>';
  const {data,error}=await sb.rpc('portal_my_cases',{p_token:tok});
  if(error||!data||!data.ok){setSess('');showLogin('Your session expired — please sign in again.');return;}
  renderCases(data);
}
function caseRow(c){
  const sc=(STATUS_COLOR[c.status]||'#eef0f2;#6b7583').split(';');
  const name = c.locked ? (cap(esc(c.case_type||'Referral'))+(c.injury_type?(' · '+esc(c.injury_type)):''))
                        : esc(c.patient||('Referral '+c.case_id));
  const stat = `<span class="badge" style="background:${sc[0]};color:${sc[1]};">${esc(STATUS_LABEL[c.status]||cap(c.status||'In progress'))}</span>`;
  const lock = c.locked ? ' <span class="lock">🔒 details unlock on accept</span>' : '';
  const appt = c.appointment_at ? `<div class="rf">Appt: ${esc(c.appointment_at)}</div>` : '';
  const url = (c.link_role==='provider'?'respond.html?t=':'status.html?t=')+encodeURIComponent(c.token||'');
  const openLbl = c.link_role==='provider' ? (c.locked?'Review &amp; accept':'Open case') : 'View status';
  return `<div class="cs"><div class="info">
      <div class="nm">${name}</div>
      <div class="rf">Reference ${esc(c.case_id||'')}</div>${appt}
      <div>${stat}${lock}</div>
    </div>
    <a class="btn navy open" style="margin:0;" href="${url}" target="_blank" rel="noopener">${openLbl}</a></div>`;
}
function renderCases(d){
  const cases=d.cases||[];
  const hi = d.name ? ('Welcome, '+esc(d.name)) : 'Your cases';
  let body;
  if(!cases.length){
    body='<div class="empty">No cases yet.<br><span class="muted">When a case is coordinated for you, it will appear here.</span></div>';
  } else {
    const open=cases.filter(c=>!['closed','declined'].includes(c.status));
    const done=cases.filter(c=>['closed','declined'].includes(c.status));
    body = open.map(caseRow).join('')
      + (done.length?`<h3 style="margin-top:24px;">Closed</h3>`+done.map(caseRow).join(''):'');
  }
  card.innerHTML=`<h2>${hi}</h2>
    <div style="margin:2px 0 8px;"><a onclick="showProfile()" style="font-size:13px;font-weight:600;color:#1a4e8a;cursor:pointer;">✏️ Edit my ${d.role==='provider'?'practice info':'firm info'}</a></div>
    <p class="muted">${d.role==='provider'?'Cases referred to your practice.':'Cases we\'re coordinating for your clients.'} Click any case to open it.</p>
    ${body}
    <p class="muted" style="margin-top:22px;">Questions on any case? Reply to <a href="mailto:referrals@mdconcierge.net">referrals@mdconcierge.net</a>.</p>`;
}
// ---------- self-service profile editing ----------
const PROV_TYPES=['Orthopaedic Surgeon','Orthopaedics','Pain Management','Physical Therapy','Chiropractic','Neurology','Neurosurgery','Imaging / Radiology','Primary Care','Podiatry','Psychology / Psychiatry','Dental / Maxillofacial','Other'];
const FIRM_TYPES=['Personal Injury','Workers’ Compensation','Auto / MVA','Social Security Disability','Mass Tort','Medical Malpractice','General Practice','Other'];
function fv(v){return esc(v==null?'':v);}
function selOpts(list,cur){return list.map(o=>`<option ${o===cur?'selected':''}>${esc(o)}</option>`).join('');}
function chk(v){return v?'checked':'';}
function rmBtn(){return `<button type="button" class="prm" onclick="rmRow(this)">✕ remove</button>`;}
function rmRow(btn){const row=btn.closest('[data-id]');if(row.getAttribute('data-id')){row.setAttribute('data-remove','1');row.style.display='none';}else row.remove();}
function docRow(d){d=d||{};return `<div class="prep" data-id="${d.id||''}">${rmBtn()}
  <label>Doctor / clinician name</label><input data-f="doctor_name" value="${fv(d.doctor_name)}"/>
  <div class="g2"><div><label>Specialty</label><input data-f="specialty" value="${fv(d.specialty)}"/></div>
  <div><label>Provider type</label><select data-f="provider_type">${selOpts(PROV_TYPES,d.provider_type)}</select></div></div>
  <label>Body parts / areas</label><input data-f="body_parts" value="${fv(d.body_parts)}" placeholder="Lumbar spine, Knee"/>
  <div class="g3"><div><label>States</label><input data-f="states" value="${fv(d.states)}"/></div>
  <div><label>Monthly capacity</label><input data-f="monthly_capacity" type="number" min="0" value="${fv(d.monthly_capacity)}"/></div>
  <div><label>EHR</label><input data-f="ehr_system" value="${fv(d.ehr_system)}"/></div></div>
  <div class="g2"><div><label>Phone</label><input data-f="phone" value="${fv(d.phone)}"/></div>
  <div><label>Fax</label><input data-f="fax" value="${fv(d.fax)}"/></div></div>
  <label>Languages</label><input data-f="languages" value="${fv(d.languages)}"/>
  <div class="g3"><label class="ck"><input type="checkbox" data-f="lien_acceptance" ${chk(d.lien_acceptance)}/> Accepts liens</label>
  <label class="ck"><input type="checkbox" data-f="ncp_required" ${chk(d.ncp_required)}/> NCP required</label>
  <label class="ck"><input type="checkbox" data-f="litigation_acceptance" ${chk(d.litigation_acceptance)}/> Litigation OK</label></div></div>`;}
function conRow(c){c=c||{};return `<div class="prep" data-id="${c.id||''}">${rmBtn()}
  <div class="g2"><div><label>Contact name</label><input data-f="name" value="${fv(c.name)}"/></div>
  <div><label>Role</label><input data-f="role" value="${fv(c.role)}"/></div></div>
  <div class="g2"><div><label>Email</label><input data-f="email" type="email" value="${fv(c.email)}"/></div>
  <div><label>Phone</label><input data-f="phone" value="${fv(c.phone)}"/></div></div>
  <label class="ck"><input type="checkbox" data-f="receives_referrals" ${chk(c.receives_referrals)}/> Send new referrals here</label></div>`;}
function attyRow(a){a=a||{};return `<div class="prep" data-id="${a.id||''}">${rmBtn()}
  <div class="g2"><div><label>First name</label><input data-f="first_name" value="${fv(a.first_name)}"/></div>
  <div><label>Last name</label><input data-f="last_name" value="${fv(a.last_name)}"/></div></div>
  <div class="g2"><div><label>Email</label><input data-f="email" type="email" value="${fv(a.email)}"/></div>
  <div><label>Phone</label><input data-f="phone" value="${fv(a.phone)}"/></div></div>
  <div class="g2"><div><label>States</label><input data-f="states" value="${fv(a.states)}"/></div>
  <div><label>Case types</label><input data-f="case_types" value="${fv(a.case_types)}"/></div></div>
  <div class="g2"><div><label>Paralegal / POC name</label><input data-f="paralegal_name" value="${fv(a.paralegal_name)}"/></div>
  <div><label>POC email</label><input data-f="paralegal_email" type="email" value="${fv(a.paralegal_email)}"/></div></div>
  <div class="g2"><div><label>POC phone</label><input data-f="paralegal_phone" value="${fv(a.paralegal_phone)}"/></div>
  <div><label>CC emails</label><input data-f="cc_emails" value="${fv(a.cc_emails)}" placeholder="comma-separated"/></div></div></div>`;}
function addRow(boxId,html){document.getElementById(boxId).insertAdjacentHTML('beforeend',html);}

async function showProfile(){
  const tok=getSess(); if(!tok){showLogin();return;}
  card.innerHTML='<div class="muted">Loading your info…</div>';
  const {data,error}=await sb.rpc('portal_profile',{p_token:tok});
  if(error||!data||!data.ok){card.innerHTML='<h2>Couldn\'t load</h2><p class="muted">Please try again.</p><a class="btn navy" onclick="loadCases()">← Back to cases</a>';return;}
  renderProfile(data);
}
function renderProfile(d){
  let html=`<a onclick="loadCases()" style="font-size:13px;font-weight:600;color:#1a4e8a;cursor:pointer;">← Back to my cases</a><h2 style="margin-top:8px;">My information</h2>
    <p class="muted">Update your details anytime — changes save instantly and the MDconcierge team is notified. (Your signed-agreement status is managed by MDconcierge.)</p>`;
  if(d.role==='provider'){
    const p=d.practice||{};
    html+=`<div class="psec"><h3>Practice</h3>
      <label>Practice name</label><input id="pf_name" value="${fv(p.name)}"/>
      <div class="g2"><div><label>Specialty</label><input id="pf_spec" value="${fv(p.specialty)}"/></div>
      <div><label>States served</label><input id="pf_states" value="${fv(p.states)}"/></div></div>
      <label>Website</label><input id="pf_web" value="${fv(p.website)}"/>
      <label>Office address</label><input id="pf_addr" value="${fv(p.address)}"/></div>
      <div class="psec"><h3>Doctors / clinicians</h3><div id="pf_docs"></div>
      <button type="button" class="padd" onclick="addRow('pf_docs',docRow())">＋ Add doctor</button></div>
      <div class="psec"><h3>Contacts</h3><div id="pf_cons"></div>
      <button type="button" class="padd" onclick="addRow('pf_cons',conRow())">＋ Add contact</button></div>`;
  }else{
    const f=d.firm||{};
    html+=`<div class="psec"><h3>Firm</h3>
      <label>Firm name</label><input id="pf_name" value="${fv(f.name)}"/>
      <div class="g2"><div><label>Practice area</label><select id="pf_ftype">${selOpts(FIRM_TYPES,f.type)}</select></div>
      <div><label>Phone</label><input id="pf_phone" value="${fv(f.phone)}"/></div></div>
      <label>Website</label><input id="pf_web" value="${fv(f.website)}"/>
      <label>Office address</label><input id="pf_addr" value="${fv(f.address)}"/></div>
      <div class="psec"><h3>Attorney(s)</h3><div id="pf_attys"></div>
      <button type="button" class="padd" onclick="addRow('pf_attys',attyRow())">＋ Add attorney</button></div>`;
  }
  html+=`<div class="err" id="pf_err"></div><button class="btn gold" onclick="saveProfile('${d.role}')">Save changes</button>`;
  card.innerHTML=html;
  if(d.role==='provider'){(d.doctors||[]).forEach(x=>addRow('pf_docs',docRow(x)));(d.contacts||[]).forEach(x=>addRow('pf_cons',conRow(x)));
    if(!(d.doctors||[]).length)addRow('pf_docs',docRow());if(!(d.contacts||[]).length)addRow('pf_cons',conRow());}
  else{(d.attorneys||[]).forEach(x=>addRow('pf_attys',attyRow(x)));if(!(d.attorneys||[]).length)addRow('pf_attys',attyRow());}
}
function collectRows(boxId){
  const out=[];
  document.querySelectorAll('#'+boxId+' [data-id]').forEach(r=>{
    const o={}; const id=r.getAttribute('data-id'); if(id)o.id=parseInt(id,10);
    if(r.getAttribute('data-remove')){o._remove=true; if(o.id)out.push(o); return;}
    r.querySelectorAll('[data-f]').forEach(el=>{o[el.getAttribute('data-f')]=el.type==='checkbox'?el.checked:(el.value||'').trim();});
    out.push(o);
  });
  return out;
}
function pv(id){const el=document.getElementById(id);return el?(el.value||'').trim():'';}
async function saveProfile(role){
  const tok=getSess(); if(!tok){showLogin();return;}
  const payload={};
  if(role==='provider'){
    payload.practice={name:pv('pf_name'),specialty:pv('pf_spec'),states:pv('pf_states'),website:pv('pf_web'),address:pv('pf_addr')};
    payload.doctors=collectRows('pf_docs');
    payload.contacts=collectRows('pf_cons');
  }else{
    payload.firm={name:pv('pf_name'),type:pv('pf_ftype'),phone:pv('pf_phone'),website:pv('pf_web'),address:pv('pf_addr')};
    payload.attorneys=collectRows('pf_attys');
  }
  const e=document.getElementById('pf_err'); e.textContent='Saving…';
  const {data,error}=await sb.rpc('portal_save_profile',{p_token:tok,p_payload:payload});
  if(error||!data||!data.ok){e.textContent='Could not save — please try again.';return;}
  card.innerHTML=`<h2>✓ Saved</h2><p class="muted">Your changes are live, and we've let the MDconcierge team know. Thank you for keeping your information current.</p>
    <a class="btn navy" onclick="showProfile()">Edit again</a> <a class="btn" style="background:#eef5fc;color:#1a2230;" onclick="loadCases()">Back to my cases</a>`;
  window.scrollTo(0,0);
}
function logout(){setSess('');showLogin('Signed out.');}

// ---------- route ----------
if(keyParam){doKeyLogin();}
else if(setupTok){showSetup();}
else if(getSess()){loadCases();}
else{showLogin();}
</script>
</body>
</html>
