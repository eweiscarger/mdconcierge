<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MDconcierge — Provider Network</title>
<style>
  :root{--bg:#0b0f14;--bg2:#111720;--bg3:#171e28;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
    --gold:#c8922a;--gold2:#e8b84b;--text:#e8e4dc;--muted:#6b7583;--muted2:#8e97a3;--green:#2ecc8a;--red:#e0556b;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,Segoe UI,sans-serif;font-size:14px;}
  a{color:var(--gold2);}
  .top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;}
  .brand{font-weight:800;font-size:18px;}.brand span{color:var(--gold);}
  .top .sub{font-size:12px;color:var(--muted);}.top .actions{display:flex;gap:10px;align-items:center;}
  .wrap{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 56px);}
  .list{border-right:1px solid var(--border);padding:14px;overflow:auto;}
  .detail{padding:18px 22px;overflow:auto;}
  .btn{background:var(--gold);color:#1a1305;border:none;border-radius:8px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer;}
  .btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--muted2);font-weight:500;}
  .btn.danger{background:transparent;border:1px solid var(--red);color:var(--red);font-weight:500;}
  .btn.sm{padding:5px 9px;font-size:12px;}
  .pcard{padding:10px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;cursor:pointer;background:var(--bg2);}
  .pcard:hover{border-color:var(--border2);}.pcard.sel{border-color:var(--gold);background:var(--bg3);}
  .pcard .n{font-weight:600;}.pcard .m{font-size:12px;color:var(--muted);}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 3px;}
  input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--gold);}
  select:disabled{opacity:.45;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
  .fld{margin-bottom:10px;}.mb0{margin-bottom:0;}
  .sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin:22px 0 10px;border-top:1px solid var(--border);padding-top:16px;}
  .row{display:flex;gap:8px;align-items:center;padding:9px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:7px;background:var(--bg2);}
  .row .grow{flex:1;}.row .nm{font-weight:600;font-size:13px;}.row .mt{font-size:12px;color:var(--muted);}
  .pill{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--border2);color:var(--muted2);margin-left:4px;}
  .pill.ref{border-color:var(--green);color:var(--green);}.pill.on{border-color:var(--gold);color:var(--gold2);}
  .empty{color:var(--muted);font-size:13px;padding:18px 0;}
  .chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);}.chk input{width:auto;}
  .gate{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;}
  .gate .card{width:340px;max-width:90vw;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:28px;}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--green);color:var(--green);padding:10px 16px;border-radius:8px;font-size:13px;display:none;z-index:200;}
  .editbox{border:1px solid var(--border2);border-radius:9px;padding:13px;margin:8px 0 14px;background:var(--bg2);}
  .editbox h4{margin:0 0 10px;font-size:13px;color:var(--gold2);}
  .bpgrid{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;}
</style>
</head>
<body>
<div id="gate" class="gate">
  <div class="card">
    <div class="brand" style="font-size:22px;">MD<span>concierge</span></div>
    <div class="sub" style="color:var(--muted);font-size:13px;margin:4px 0 20px;">Provider Network — sign in</div>
    <div class="fld"><label>Email</label><input id="g-email" type="email" autocomplete="username"/></div>
    <div class="fld"><label>Password</label><input id="g-pass" type="password" autocomplete="current-password"/></div>
    <button class="btn" style="width:100%;" id="g-btn" onclick="login()">Sign in</button>
    <div id="g-err" style="color:var(--red);font-size:12px;margin-top:10px;display:none;"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="top">
    <div><span class="brand">MD<span>concierge</span></span> &nbsp;<span class="sub">Provider Network</span></div>
    <div class="actions"><a href="admin-v2.html" class="sub">← Dashboard</a><button class="btn ghost sm" onclick="logout()">Sign out</button></div>
  </div>
  <div class="wrap">
    <div class="list">
      <button class="btn" style="width:100%;margin-bottom:12px;" onclick="newPractice()">+ Add practice / group</button>
      <input id="search" placeholder="Search practices…" style="margin-bottom:12px;" oninput="renderList()"/>
      <div id="plist"></div>
    </div>
    <div class="detail" id="detail"><div class="empty">Select a practice on the left, or add one to get started.</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://pjdbzrzadlldojuvdrfj.supabase.co';
const SUPABASE_KEY='sb_publishable_Syx-8oQDjnR-XYYMA2T-wQ_qyKuFdfL';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const ROLES=['Physician / Provider','Office Manager / Administrator','Medical Assistant','Work-Comp Coordinator','Billing Contact','Scheduler','MSO Contact','Other'];
const SPECIALTIES=['Orthopedic Surgery','Orthopedics (non-surgical)','Neurosurgery','Spine Surgery','Neurospine','Neurology','Pain Management','Physical Medicine & Rehab (PM&R)','Chiropractic','Physical Therapy','Podiatry','Radiology / Imaging','Psychology / Psychiatry','Internal Medicine','Primary Care','Other'];
const PROVIDER_TYPES=['MD','DO','DC (Chiropractor)','PT (Physical Therapist)','DPM (Podiatrist)','PA-C','NP','Imaging Center','Surgery Center','Facility','Other'];
const BODY_PARTS=['Spine / Back','Neck / Cervical','Shoulder','Elbow','Hand / Wrist','Upper extremity','Hip','Knee','Ankle / Foot','Lower extremity','Head / TBI','Pain management','Other'];
let state={msos:[],practices:[],providers:[],contacts:[],locations:[],sel:null,editDoc:null};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2600);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function gate(show){document.getElementById('gate').style.display=show?'flex':'none';document.getElementById('app').style.display=show?'none':'block';}
function v(id){const e=document.getElementById(id);return e?(e.value||'').trim():'';}
function chk(id){const e=document.getElementById(id);return e?!!e.checked:false;}
function selOpts(list,cur){const arr=(cur&&!list.includes(cur))?[cur,...list]:list;return '<option value=""></option>'+arr.map(x=>`<option ${x===cur?'selected':''}>${esc(x)}</option>`).join('');}

async function login(){
  const email=v('g-email');const password=document.getElementById('g-pass').value||'';
  const err=document.getElementById('g-err');err.style.display='none';
  const btn=document.getElementById('g-btn');btn.disabled=true;btn.textContent='Signing in…';
  const {error}=await sb.auth.signInWithPassword({email,password});
  btn.disabled=false;btn.textContent='Sign in';
  if(error){err.textContent=error.message||'Sign-in failed';err.style.display='block';return;}
  gate(false);await loadAll();
}
async function logout(){await sb.auth.signOut();gate(true);}

async function loadAll(){
  const [m,p,pr,c,loc]=await Promise.all([
    sb.from('msos').select('*').order('name'),
    sb.from('practices').select('*').order('name'),
    sb.from('providers').select('*').order('doctor_name'),
    sb.from('contacts').select('*').order('name'),
    sb.from('locations').select('*').order('label'),
  ]);
  state.msos=m.data||[];state.practices=p.data||[];state.providers=pr.data||[];state.contacts=c.data||[];state.locations=loc.data||[];
  renderList();
  if(state.sel&&!state.practices.find(x=>x.id===state.sel))state.sel=null;
  if(state.sel)renderDetail();else document.getElementById('detail').innerHTML='<div class="empty">Select a practice on the left, or add one to get started.</div>';
}
function renderList(){
  const q=v('search').toLowerCase();
  const rows=state.practices.filter(p=>!q||(p.name||'').toLowerCase().includes(q)||(p.specialty||'').toLowerCase().includes(q));
  document.getElementById('plist').innerHTML=rows.length?rows.map(p=>{
    const docs=state.providers.filter(d=>d.practice_id===p.id).length;
    const cts=state.contacts.filter(c=>c.practice_id===p.id).length;
    return `<div class="pcard ${state.sel===p.id?'sel':''}" onclick="sel(${p.id})"><div class="n">${esc(p.name)}</div><div class="m">${esc(p.specialty||'—')} · ${docs} provider(s) · ${cts} contact(s)</div></div>`;
  }).join(''):'<div class="empty">No practices yet. Click “Add practice” above.</div>';
}
function sel(id){state.sel=id;state.editDoc=null;renderList();renderDetail();}
function msoOptions(s){return `<option value="">— none —</option>`+state.msos.map(m=>`<option value="${m.id}" ${m.id===s?'selected':''}>${esc(m.name)}</option>`).join('')+`<option value="__new">+ Add new MSO…</option>`;}

function renderDetail(){
  const p=state.practices.find(x=>x.id===state.sel);if(!p)return;
  const docs=state.providers.filter(d=>d.practice_id===p.id);
  const cts=state.contacts.filter(c=>c.practice_id===p.id);
  const locs=state.locations.filter(l=>l.practice_id===p.id);
  document.getElementById('detail').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2 style="margin:0;font-size:20px;">${esc(p.name)}</h2>
      <button class="btn danger sm" onclick="delPractice(${p.id})">Delete practice</button>
    </div>
    <div class="editbox">
      <div class="grid2">
        <div class="fld"><label>Practice / group name</label><input id="f-name" value="${esc(p.name)}"/></div>
        <div class="fld"><label>Primary specialty</label><select id="f-spec">${selOpts(SPECIALTIES,p.specialty)}</select></div>
      </div>
      <div class="grid4">
        <div class="fld"><label>State(s)</label><input id="f-states" value="${esc(p.states)}" placeholder="PA, NJ"/></div>
        <div class="fld"><label>Status</label><select id="f-status"><option ${p.status==='active'?'selected':''}>active</option><option ${p.status==='paused'?'selected':''}>paused</option><option ${p.status==='prospect'?'selected':''}>prospect</option></select></div>
        <div class="fld"><label>MSO</label><select id="f-mso" onchange="msoChange(this)">${msoOptions(p.mso_id)}</select></div>
        <div class="fld"><label>Website</label><input id="f-web" value="${esc(p.website)}"/></div>
      </div>
      <div class="fld"><label>Notes</label><textarea id="f-notes" rows="2">${esc(p.notes)}</textarea></div>
      <button class="btn sm" onclick="savePractice(${p.id})">Save practice</button>
    </div>

    <div class="sec">Office locations — ${locs.length} <span class="muted" style="text-transform:none;font-weight:400;">(add every office — providers can be "same as practice" or a specific one)</span></div>
    <div id="loclist">${locs.map(locRow).join('')||'<div class="empty mb0">No locations yet — add the practice’s office(s) below.</div>'}</div>
    <div class="editbox"><h4>Add location</h4>
      <div class="grid3">
        <div class="fld mb0"><label>Label</label><input id="nl-label" placeholder="Main Office / North Office"/></div>
        <div class="fld mb0"><label>Address</label><input id="nl-addr" placeholder="123 Market St, Philadelphia, PA 19103"/></div>
        <div class="fld mb0"><label>Phone</label><input id="nl-phone"/></div>
      </div>
      <button class="btn sm" style="margin-top:8px;" onclick="addLocation(${p.id})">+ Add location</button>
    </div>

    <div class="sec">Providers (doctors) — ${docs.length}</div>
    <div id="doclist">${docs.map(docRow).join('')||'<div class="empty mb0">No providers yet.</div>'}</div>
    ${docForm(p.id)}

    <div class="sec">Contacts — ${cts.length} <span class="muted" style="text-transform:none;font-weight:400;">(check “receives referrals” for everyone who should get the referral email)</span></div>
    <div id="ctlist">${cts.map(contactRow).join('')||'<div class="empty mb0">No contacts yet.</div>'}</div>
    <div class="editbox"><h4>Add contact</h4>
      <div class="grid3">
        <div class="fld mb0"><label>Attach to</label><select id="nc-attach"><option value="practice">Practice (whole)</option>${docs.map(d=>`<option value="d${d.id}">${esc(d.doctor_name)}</option>`).join('')}</select></div>
        <div class="fld mb0"><label>Role</label><select id="nc-role">${ROLES.map(r=>`<option>${r}</option>`).join('')}</select></div>
        <div class="fld mb0"><label>Name</label><input id="nc-name" placeholder="Full name"/></div>
      </div>
      <div class="grid3" style="margin-top:8px;">
        <div class="fld mb0"><label>Email</label><input id="nc-email" type="email"/></div>
        <div class="fld mb0"><label>Phone</label><input id="nc-phone"/></div>
        <div class="fld mb0" style="display:flex;align-items:flex-end;"><label class="chk"><input type="checkbox" id="nc-ref"/> Receives referrals</label></div>
      </div>
      <button class="btn sm" style="margin-top:9px;" onclick="addContact(${p.id})">+ Add contact</button>
    </div>`;
}
function locRow(l){return `<div class="row"><div class="grow"><div class="nm">${esc(l.label||'(office)')}</div><div class="mt">${esc(l.address||'—')}${l.phone?(' · '+esc(l.phone)):''}</div></div><button class="btn danger sm" onclick="delLocation(${l.id})">Remove</button></div>`;}
function docRow(d){
  const flags=[d.active?'<span class="pill on">active</span>':'<span class="pill">inactive</span>',d.lien_acceptance?'<span class="pill">lien</span>':'',d.ncp_required?'<span class="pill">NCP req</span>':'',d.litigation_acceptance?'<span class="pill">litigation</span>':''].join('');
  const where=(d.same_as_practice===false&&d.location_id)?(state.locations.find(l=>l.id===d.location_id)?.label||'specific office'):'same as practice';
  const bp=(d.body_parts&&d.body_parts.length)?(' · '+esc(d.body_parts.join(', '))):'';
  return `<div class="row"><div class="grow"><div class="nm">${esc(d.doctor_name)} ${flags}</div><div class="mt">${esc(d.specialty||d.provider_type||'—')}${d.states?(' · '+esc(d.states)):''} · 📍 ${esc(where)}${bp}</div></div>
    <button class="btn ghost sm" onclick="editDoc(${d.id})">Edit</button><button class="btn danger sm" onclick="delDoctor(${d.id})">Remove</button></div>`;
}
function docForm(pid){
  const d=state.editDoc?state.providers.find(x=>x.id===state.editDoc):null;
  const locs=state.locations.filter(l=>l.practice_id===pid);
  const val=(k)=>d?esc(d[k]):'';
  const ck=(k)=>(d&&d[k])?'checked':'';
  const samep=d?(d.same_as_practice!==false):true;
  return `<div class="editbox"><h4>${d?'Edit provider':'Add provider'}</h4>
    <input type="hidden" id="pf-id" value="${d?d.id:''}"/>
    <div class="grid3">
      <div class="fld mb0"><label>Doctor name *</label><input id="pf-name" value="${val('doctor_name')}" placeholder="Dr. Jane Smith"/></div>
      <div class="fld mb0"><label>Specialty</label><select id="pf-spec">${selOpts(SPECIALTIES,d?d.specialty:'')}</select></div>
      <div class="fld mb0"><label>Provider type</label><select id="pf-type">${selOpts(PROVIDER_TYPES,d?d.provider_type:'')}</select></div>
    </div>
    <div class="grid4" style="margin-top:8px;">
      <div class="fld mb0"><label>State(s)</label><input id="pf-states" value="${val('states')}" placeholder="PA, NJ"/></div>
      <div class="fld mb0"><label>Phone</label><input id="pf-phone" value="${val('phone')}"/></div>
      <div class="fld mb0"><label>Fax</label><input id="pf-fax" value="${val('fax')}"/></div>
      <div class="fld mb0"><label>Monthly capacity</label><input id="pf-cap" type="number" value="${d&&d.monthly_capacity!=null?d.monthly_capacity:''}"/></div>
    </div>
    <div class="fld mb0" style="margin-top:10px;"><label>Office location</label>
      <label class="chk" style="margin-bottom:6px;"><input type="checkbox" id="pf-samep" ${samep?'checked':''} onchange="document.getElementById('pf-loc').disabled=this.checked"/> Same as practice (all offices)</label>
      <select id="pf-loc" ${samep?'disabled':''}><option value="">— pick an office —</option>${locs.map(l=>`<option value="${l.id}" ${d&&d.location_id===l.id?'selected':''}>${esc(l.label||l.address||('Location '+l.id))}</option>`).join('')}</select>
    </div>
    <div class="grid2" style="margin-top:8px;">
      <div class="fld mb0"><label>Languages</label><input id="pf-lang" value="${val('languages')}" placeholder="English, Spanish"/></div>
      <div class="fld mb0"><label>EHR system</label><input id="pf-ehr" value="${val('ehr_system')}"/></div>
    </div>
    <div class="fld mb0" style="margin-top:10px;"><label>Body parts / areas treated</label>
      <div class="bpgrid">${BODY_PARTS.map(bp=>`<label class="chk"><input type="checkbox" class="bp" value="${esc(bp)}" ${(d&&Array.isArray(d.body_parts)&&d.body_parts.includes(bp))?'checked':''}/> ${bp}</label>`).join('')}</div>
    </div>
    <div style="display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;">
      <label class="chk"><input type="checkbox" id="pf-active" ${d?ck('active'):'checked'}/> Active</label>
      <label class="chk"><input type="checkbox" id="pf-lien" ${ck('lien_acceptance')}/> Accepts liens</label>
      <label class="chk"><input type="checkbox" id="pf-ncp" ${ck('ncp_required')}/> NCP required</label>
      <label class="chk"><input type="checkbox" id="pf-lit" ${ck('litigation_acceptance')}/> Litigation OK</label>
    </div>
    <div style="margin-top:12px;"><button class="btn sm" onclick="saveDoctor(${pid})">${d?'Save changes':'+ Add provider'}</button>
      ${d?`<button class="btn ghost sm" style="margin-left:8px;" onclick="cancelDoc()">Cancel</button>`:''}</div>
  </div>`;
}
function editDoc(id){state.editDoc=id;renderDetail();document.getElementById('pf-name')?.scrollIntoView({block:'center'});}
function cancelDoc(){state.editDoc=null;renderDetail();}
function contactRow(c){
  const who=c.provider_id?(state.providers.find(d=>d.id===c.provider_id)?.doctor_name||'Provider'):'Practice';
  return `<div class="row"><div class="grow"><div class="nm">${esc(c.name||'(no name)')}<span class="pill">${esc(c.role||'—')}</span>${c.receives_referrals?'<span class="pill ref">✓ referrals</span>':''}</div>
    <div class="mt">${esc(c.email||'—')}${c.phone?(' · '+esc(c.phone)):''} · ${esc(who)}</div></div>
    <button class="btn ghost sm" onclick="toggleRef(${c.id},${c.receives_referrals?0:1})">${c.receives_referrals?'Unset':'Set'} referrals</button>
    <button class="btn danger sm" onclick="delContact(${c.id})">Remove</button></div>`;
}

async function newPractice(){const {data,error}=await sb.from('practices').insert({name:'New practice'}).select().single();if(error){toast('Error: '+error.message);return;}await loadAll();sel(data.id);}
async function savePractice(id){
  let mso=v('f-mso');if(mso==='__new'){toast('Pick or create the MSO first');return;}
  const patch={name:v('f-name'),specialty:v('f-spec'),states:v('f-states'),status:v('f-status'),website:v('f-web'),notes:v('f-notes'),mso_id:mso?parseInt(mso,10):null};
  const {error}=await sb.from('practices').update(patch).eq('id',id);if(error){toast('Error: '+error.message);return;}
  await loadAll();toast('Practice saved');
}
async function delPractice(id){if(!confirm('Delete this practice and all its locations, providers and contacts? Cannot be undone.'))return;const {error}=await sb.from('practices').delete().eq('id',id);if(error){toast('Error: '+error.message);return;}state.sel=null;await loadAll();toast('Practice deleted');}
async function msoChange(selEl){if(selEl.value!=='__new')return;const name=prompt('New MSO name:');if(!name){selEl.value='';return;}const {data,error}=await sb.from('msos').insert({name:name.trim()}).select().single();if(error){toast('Error: '+error.message);selEl.value='';return;}state.msos.push(data);selEl.innerHTML=msoOptions(data.id);}

async function addLocation(pid){const label=v('nl-label');const addr=v('nl-addr');if(!label&&!addr){toast('Enter a label or address');return;}const {error}=await sb.from('locations').insert({practice_id:pid,label,address:addr,phone:v('nl-phone')});if(error){toast('Error: '+error.message);return;}await loadAll();renderDetail();toast('Location added');}
async function delLocation(id){if(!confirm('Remove this location?'))return;const {error}=await sb.from('locations').delete().eq('id',id);if(error){toast('Error: '+error.message);return;}await loadAll();renderDetail();}

async function saveDoctor(pid){
  const name=v('pf-name');if(!name){toast('Enter the doctor name');return;}
  const cap=v('pf-cap');const samep=chk('pf-samep');const locVal=v('pf-loc');
  const rec={practice_id:pid,doctor_name:name,specialty:v('pf-spec'),provider_type:v('pf-type'),states:v('pf-states'),
    phone:v('pf-phone'),fax:v('pf-fax'),languages:v('pf-lang'),ehr_system:v('pf-ehr'),
    monthly_capacity:cap?parseInt(cap,10):null,active:chk('pf-active'),lien_acceptance:chk('pf-lien'),ncp_required:chk('pf-ncp'),litigation_acceptance:chk('pf-lit'),
    same_as_practice:samep,location_id:samep?null:(locVal?parseInt(locVal,10):null),
    body_parts:Array.from(document.querySelectorAll('.bp:checked')).map(x=>x.value)};
  const id=v('pf-id');
  const res=id?await sb.from('providers').update(rec).eq('id',parseInt(id,10)):await sb.from('providers').insert(rec);
  if(res.error){toast('Error: '+res.error.message);return;}
  state.editDoc=null;await loadAll();renderDetail();toast(id?'Provider updated':'Provider added');
}
async function delDoctor(id){if(!confirm('Remove this provider?'))return;const {error}=await sb.from('providers').delete().eq('id',id);if(error){toast('Error: '+error.message);return;}if(state.editDoc===id)state.editDoc=null;await loadAll();renderDetail();}
async function addContact(pid){
  const attach=v('nc-attach');const provider_id=attach.startsWith('d')?parseInt(attach.slice(1),10):null;
  const name=v('nc-name');const email=v('nc-email');if(!name&&!email){toast('Enter at least a name or email');return;}
  const {error}=await sb.from('contacts').insert({practice_id:pid,provider_id,role:v('nc-role'),name,email,phone:v('nc-phone'),receives_referrals:chk('nc-ref')});
  if(error){toast('Error: '+error.message);return;}await loadAll();renderDetail();toast('Contact added');
}
async function delContact(id){if(!confirm('Remove this contact?'))return;const {error}=await sb.from('contacts').delete().eq('id',id);if(error){toast('Error: '+error.message);return;}await loadAll();renderDetail();}
async function toggleRef(id,val){const {error}=await sb.from('contacts').update({receives_referrals:!!val}).eq('id',id);if(error){toast('Error: '+error.message);return;}await loadAll();renderDetail();}

document.getElementById('g-pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
(async()=>{const {data:{session}}=await sb.auth.getSession();if(session){gate(false);await loadAll();}else{gate(true);}})();
</script>
</body>
